<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <link rel="stylesheet" href="css/common.css">

    <link rel="stylesheet" href="css/checkout.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div id="navbar-container"></div>
    <!-- Panel Ends here -->
    <main class="checkout-page">

        <section class="checkout-left">

            <div class="checkout-card">

                <h1 class="checkout-heading">

                    Checkout

                </h1>

            </div>

            <div class="checkout-card">

                <div class="card-header">

                    <h2>

                        Shipping Address

                    </h2>

                    <button class="change-btn">

                        Change

                    </button>

                </div>

                <div class="address-box">

                    <h3 id="customerName">

                        Jivitesh Goyal

                    </h3>

                    <p id="customerPhone">

                        +91 9876543210

                    </p>

                    <p id="customerAddress">

                        Barnala, Punjab, India

                    </p>

                </div>

            </div>

            <div class="checkout-card">

                <h2 class="section-title">

                    Delivery Method

                </h2>

                <div class="delivery-option">

                    <input type="radio" id="standard" name="delivery" value="0" checked>

                    <label for="standard">

                        <strong>Standard Delivery</strong>

                        <span>FREE</span>

                        <small>Arrives Tomorrow</small>

                    </label>

                </div>

                <div class="delivery-option">

                    <input type="radio" id="express" name="delivery" value="7">

                    <label for="express">

                        <strong>Express Delivery</strong>

                        <span>$7</span>

                        <small>Arrives Today</small>

                    </label>

                </div>

            </div>

            <div class="checkout-card">

                <h2 class="section-title">

                    Review Your Items

                </h2>

                <div id="reviewItems">

                </div>

            </div>

        </section>

        <aside class="checkout-right">

            <div class="summary-card">

                <h2 class="summary-heading">
                    Order Summary
                </h2>

                <div class="summary-row">

                    <span>
                        Items (<span id="summaryItems">0</span>)
                    </span>

                    <span id="itemsPrice">
                        $0
                    </span>

                </div>

                <div class="summary-row">

                    <span>
                        Shipping
                    </span>

                    <span id="shippingPrice">
                        FREE
                    </span>

                </div>

                <div class="summary-row">

                    <span>
                        Estimated Tax
                    </span>

                    <span>
                        $0
                    </span>

                </div>

                <hr class="summary-divider">

                <div class="summary-total">

                    <span>
                        Order Total
                    </span>

                    <span id="orderTotal">
                        $0
                    </span>

                </div>

                <button class="place-order-btn" id="placeOrderBtn">

                    Place your Order

                </button>

            </div>

        </aside>

    </main>




    <div id="footer-container"></div>

    <script src="js/products.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/common.js"></script>

    <script src="js/checkout.js"></script>

</body>

</html>
