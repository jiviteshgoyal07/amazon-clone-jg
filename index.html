<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon India Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <!--Navbar Starts-->
    <div class="navbar">
        <div class="nav-logo border">
            <div class="logo-text">
                Amazon
            </div>
        </div>

        <div class="nav-address nav-box border">
            <p class="add-first">
                Deliver to
            </p>

            <p class="add-second">
                India
            </p>
        </div>

        <div class="nav-search">
            <select class="search-select">
                <option>All</option>
                <option>Electronics</option>
                <option>Books</option>
            </select>

            <input type="text" class="search-input" placeholder="Search Amazon.in">

            <button class="search-button">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div class="nav-language nav-box border">
            <span class="lang-icon">
                🇮🇳
            </span>
            <span class="lang-text">EN</span>
            <span class="lang-dropdown">
                <i class="fa-solid fa-caret-down"></i>
            </span>

        </div>

        <div class="nav-item nav-box border">

            <p class="nav-small">
                Hello, Sign in
            </p>

            <p class="nav-large">
                <span>Account & Lists</span>
                <i class="fa-solid fa-caret-down"></i>
            </p>

        </div>

        <div class="nav-item nav-box border">

            <p class="nav-small">
                Returns
            </p>

            <p class="nav-large">
                & Orders
            </p>

        </div>

        <div class="nav-cart nav-box border">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-text">Cart</span>
        </div>


    </div>
    <!-- Navbar Ends -->

    <!-- Panel Starts here-->
    <div class="panel">
        <div class="panel-all border">
            <i class="fa-solid fa-bars"></i>
            <span>All</span>
        </div>
        <div class="panel-links">
            <div class="panel-option border">
                <span>Fresh</span>  
            </div>
            <div class="panel-option border">
                <span>MX Player</span>  
            </div>
            <div class="panel-option border">
                <span>Sell</span>   
            </div>
            <div class="panel-option border">
                <span>Bestsellers</span>    
            </div>
            <div class="panel-option border">
                <span>Today's Deals</span>  
            </div>
            <div class="panel-option border">
                <span>Mobiles</span>    
            </div>
            <div class="panel-option border">
                <span>New Releases</span>   
            </div>
            <div class="panel-option border">
                <span>Prime</span> 
                <i class="fa-solid fa-caret-down"></i> 
            </div>
            <div class="panel-option border">
                <span>Amazon Pay</span> 
            </div>
            <div class="panel-option border">
                <span>Electronics</span>    
            </div>
            <div class="panel-option border">
                <span>Customer Service</span>   
            </div>
            <div class="panel-option border">
                <span>Home & Kitchen</span> 
            </div>
            <div class="panel-option border">
                <span>Fashion</span>    
            </div>
            <div class="panel-option border">
                <span>Computers</span>  
            </div>
            <div class="panel-option border">
                <span>Toys & Games</span>   
            </div>
        </div>
    </div>
    <!-- Panel Ends here -->
    
</body>

</html>
