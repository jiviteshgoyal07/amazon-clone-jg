<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon India Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Navbar Starts-->
    <div class="navbar">
        <div class="nav-logo border">
            <div class="logo-text">
                Amazon
            </div>
        </div>

        <div class="nav-address border">
            <p class="add-first">
                Deliver to
            </p>

            <p class="add-second">
                India
            </p>
        </div>

        <div class="nav-search">
            <select class="search-select">
                <option>All</option>
                <option>Electronics</option>
                <option>Books</option>
            </select>

            <input type="text" class="search-input" placeholder="Search Amazon.in">

            <button class="search-button">
                🔍
            </button>
        </div>
        
        <div class="nav-language">
            Language
        </div>
        
        <div class="nav-signin">
            Sign In
        </div>

        <div class="nav-orders">
            Returns & Orders
        </div>

        <div class="nav-cart">
            Cart
        </div>    

                     
    </div>
    <!-- Navbar Ends -->
</body>
</html>
